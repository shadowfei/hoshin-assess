{% extends "base.html" %}
{% block title %}企业基本信息{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-lg-8">
<div class="card"><div class="card-header bg-primary text-white">第一步：企业基本信息</div><div class="card-body">
<form method="post" action="/assess/new">
<div class="row mb-3"><div class="col-md-6"><label class="form-label">企业名称</label><input type="text" name="company_name" class="form-control" required></div>
<div class="col-md-6"><label class="form-label">所属行业</label><select name="industry" class="form-select"><option>制造业</option><option>精密制造</option><option>电子制造</option><option>机械制造</option><option>化工</option><option>其他</option></select></div></div>
<div class="row mb-3"><div class="col-md-3"><label class="form-label">成立年份</label><input type="number" name="year_established" class="form-control" placeholder="如2010"></div>
<div class="col-md-3"><label class="form-label">年销售额(万元)</label><input type="number" name="annual_revenue" class="form-control" step="0.1"></div>
<div class="col-md-3"><label class="form-label">员工总数</label><input type="number" name="employee_count" class="form-control"></div>
<div class="col-md-3"><label class="form-label">管理人员数</label><input type="number" name="manager_count" class="form-control"></div></div>
<div class="mb-3"><label class="form-label">企业愿景</label><textarea name="company_vision" class="form-control" rows="2" placeholder="如：成为行业精益智造标杆"></textarea></div>
<div class="mb-3"><label class="form-label">企业使命</label><textarea name="company_mission" class="form-control" rows="2" placeholder="如：用精益管理为客户创造价值"></textarea></div>
<div class="mb-3"><label class="form-label">评估人</label><input type="text" name="assessor" class="form-control"></div>
<button type="submit" class="btn btn-primary btn-lg">下一步：开始评估 →</button>
</form></div></div></div></div>
{% endblock %}
